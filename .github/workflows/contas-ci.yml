name: CI - Core Banking Contas

on:
  push:
    branches: [ "main" ]
    paths:
      - "core-banking-contas/**"

  pull_request:
    branches: [ "main" ]
    paths:
      - "core-banking-contas/**"

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: core-banking-contas

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Dar permissão ao mvnw
        run: chmod +x mvnw

      - name: Build (sem testes)
        run: ./mvnw clean install -DskipTests
