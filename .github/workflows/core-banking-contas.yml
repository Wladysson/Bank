name: Deploy Contas

on:
  push:
    branches: [ "main" ]
    paths:
      - 'core-banking-contas/**' # SÓ dispara se você mexer nesta pasta específica

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/core-banking-contas

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # O segredo está aqui: working-directory define onde o Maven vai rodar
      - name: Build with Maven
        run: mvn clean package -DskipTests
        working-directory: ./core-banking-contas

      - name: Log into registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./core-banking-contas # Contexto do Docker é a pasta do serviço
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
